version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - 'next'
          - '@next/*'
          - 'eslint-config-next'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      trpc:
        patterns:
          - '@trpc/*'
      radix:
        patterns:
          - '@radix-ui/*'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
